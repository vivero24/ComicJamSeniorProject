<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Comic Jam</title>

    <script src="https://cdn.jsdelivr.net/npm/p5@1.9.0/lib/p5.min.js"></script>
    <script src="canvas.js"></script>
  </head>

  <body>
    <div id="canvas-container">
      <div id="brush-tools">

        <div class="tool-section">
          <label class="title-text">Brush Options</label>
          <div id="tool-button-container" class="button-container"></div>
        </div>

        <div class="separator"></div>

        <div class="tool-section">
          <label class="title-text">Brush Size</label>
          <div id="size-button-container" class="button-container"></div>
        </div>

        <div class="separator"></div>

        <div class="tool-section">
          <label class="title-text">Brush Colors</label>
          <div id="color-button-container" class="button-container"></div>
        </div>
      </div>
      <div id="canvas"></div>
    </div>
  </body>

  <style>
      body {
        margin: 0;
        height: 100vh;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #e5e5e5;
        font-family: sans-serif;
        background-image: url("assets/background.png");
        background-size: cover;
        background-position: center;
        background-repeat: no-repeat;

      }

      #canvas-container {
        width: 80vw;
        height: 80vh;
        background: white;
        border-radius: 12px;
        box-shadow: 0 4px 20px rgb(0, 0, 0);
        display: flex;
        overflow: hidden;
      }

      #brush-tools {
        width: 35vw;
        background: #f4f4f4;
        padding: 20px;
        box-sizing: border-box;
        border-right: 1px solid #ddd;
      }

      #canvas {
        flex: 1;
        display: flex;
        justify-content: center;
        align-items: center;
        background: #ccc;
      }

      .tool-section {
        margin-bottom: 20px;
      }

      .separator {
        height: 3px;
        background: #000000;
        margin: 12px 0;
      }

      .button-container {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        justify-content: center;
      }

      .tool-button {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #aaa;
        background: #fff;
        cursor: pointer;
        text-align: center;
      }

      .size-button {
        padding: 6px 10px;
        border-radius: 6px;
        border: 1px solid #aaa;
        background: #fff;
        cursor: pointer;
        text-align: center;
      }

      .color-button {
        width: 5vw;
        height: 5vw;
      }

      @font-face {
        font-family: "Sketch";
        src: url("assets/fonts/SketchBook-B5pB.ttf") format("truetype");
      }

      .title-text {
        font-family: "Sketch";
        font-size: clamp(18px, 8vw, 64px);
      }

      .selected {
        border: 3px solid #4a90e2 !important;
      }
    </style>
</html>
